// Proto2 enum grammar: closed semantics, allow_alias, reserved values,
// option annotations on enum and enum values.

syntax = "proto2";

package proto2;

import "proto2/custom_options.proto";

// Closed enum (proto2 default): unknown values are rejected.
enum Status {
  option (enum_exhaustive) = true;

  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1 [(enum_value_label) = "active", (enum_value_numeric) = 1];
  STATUS_INACTIVE = 2 [(enum_value_label) = "inactive"];
  STATUS_PENDING = 3 [deprecated = true];

  reserved 10 to 20;
  reserved 50, 51, 52;
  reserved "STATUS_LEGACY", "STATUS_OLD";
}

// Enum with allow_alias = true: multiple names for the same number.
enum AliasedStatus {
  option allow_alias = true;

  ALIASED_STATUS_UNSPECIFIED = 0;
  ALIASED_STATUS_UNKNOWN = 0;    // alias of UNSPECIFIED
  ALIASED_STATUS_OK = 1;
  ALIASED_STATUS_SUCCESS = 1;    // alias of OK
  ALIASED_STATUS_DONE = 1;       // another alias
  ALIASED_STATUS_ERROR = 2;
  ALIASED_STATUS_FAILURE = 2;    // alias of ERROR
}

// Enum demonstrating the full numeric value range and special literals.
// Values are 32-bit signed integers.
enum NumberRange {
  NUMBER_RANGE_ZERO = 0;
  NUMBER_RANGE_ONE = 1;
  NUMBER_RANGE_MAX = 2147483647;
  NUMBER_RANGE_NEG_ONE = -1;
  NUMBER_RANGE_MIN = -2147483648;
  NUMBER_RANGE_HEX = 256;        // 0x100 in decimal
  NUMBER_RANGE_OCTAL = 8;        // 010 in octal
}

// Nested enum inside a message.
message WithNestedEnum {
  enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    DIRECTION_NORTH = 1;
    DIRECTION_SOUTH = 2;
    DIRECTION_EAST = 3;
    DIRECTION_WEST = 4;
  }

  // Fields using the nested enum type.
  optional Direction heading = 1;
  repeated Direction waypoints = 2;
  required Direction destination = 3;

  // Reserved in nested enum.
  enum LegacyEnum {
    LEGACY_ENUM_UNSPECIFIED = 0;
    LEGACY_ENUM_V1 = 1 [deprecated = true];
    reserved 10 to max;
    reserved "LEGACY_ENUM_DELETED";
  }
}

// Top-level enum referenced in field defaults and option values.
enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}
