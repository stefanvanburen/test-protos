// Proto2 message grammar: nested messages, oneof, maps, groups, reserved,
// and message-level options.

syntax = "proto2";

package proto2;

import "proto2/custom_options.proto";
import "proto2/enums.proto";

// Deeply nested messages with recursive type.
message Node {
  option (message_stable) = true;

  optional string value = 1;
  repeated Node children = 2;
  optional Node.Metadata meta = 3;

  message Metadata {
    optional string key = 1;
    optional string val = 2;

    message Inner {
      optional int64 timestamp = 1;
    }
  }
}

// Oneof — mutually exclusive fields with oneof-level option.
message ContactInfo {
  oneof contact {
    option (oneof_description) = "exactly one contact method";

    string email = 1;
    string phone = 2;
    string postal_address = 3;
  }

  // Field outside the oneof.
  optional string label = 4;

  // Multiple oneofs in the same message.
  oneof id {
    int64 user_id = 5;
    string external_id = 6;
  }
}

// Map fields (all key types; message, scalar, and enum values).
message MapVariants {
  map<string, int32> string_to_int = 1;
  map<int32, string> int_to_string = 2;
  map<int64, bool> int64_to_bool = 3;
  map<uint32, bytes> uint32_to_bytes = 4;
  map<uint64, double> uint64_to_double = 5;
  map<sint32, float> sint32_to_float = 6;
  map<sint64, int32> sint64_to_int = 7;
  map<fixed32, int64> fixed32_to_int64 = 8;
  map<fixed64, uint32> fixed64_to_uint32 = 9;
  map<sfixed32, uint64> sfixed32_to_uint64 = 10;
  map<sfixed64, sint32> sfixed64_to_sint32 = 11;
  map<bool, sint64> bool_to_sint64 = 12;
  map<string, Node> string_to_message = 13;
  map<int32, Color> int_to_enum = 14;
}

// Reserved fields: numbers, ranges (including max), and names.
// Also demonstrates the identifier form and single-quoted string form.
message ReservedExample {
  optional string current_name = 1;
  optional int32 current_value = 2;

  reserved 3, 4, 5;
  reserved 10 to 20;
  reserved 100 to max;
  reserved "old_name", "another_old_name";
  reserved 'single_quoted_old';
}

// Groups — proto2-only inline message+field syntax.
// A group field declares both a field and its message type simultaneously.
message GroupExample {
  // optional group
  optional group Header = 1 {
    required string name = 1;
    optional int32 version = 2;
    optional string description = 3;
  }

  // repeated group
  repeated group Item = 2 {
    required string id = 1;
    optional string label = 2;
    optional int32 quantity = 3;
    optional Color color = 4;
  }

  // required group
  required group Identity = 3 {
    required string owner = 1;
    required string project = 2;
  }
}

// Message that can be extended; demonstrates extension ranges.
message Extendable {
  option (message_stable) = false;
  option (message_description) = "Base type open for extension.";

  optional string base_field = 1;
  optional int32 base_count = 2;

  extensions 100 to 199;
  extensions 200 to 999;
  extensions 1000 to max;
}

// Message field types: other messages, enums, and fully-qualified references.
message FieldTypes {
  optional Node node_field = 1;
  repeated Node repeated_nodes = 2;
  optional Color color_field = 3;
  repeated Color repeated_colors = 4;
  optional ContactInfo contact = 5;
  optional MapVariants maps = 6;

  // Fully-qualified type references.
  optional .proto2.Node fq_node = 7;
  optional .proto2.Color fq_color = 8;
  optional .proto2.Node.Metadata fq_nested = 9;
}
